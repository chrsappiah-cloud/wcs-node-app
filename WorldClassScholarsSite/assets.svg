<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="display:none;">
  <!-- Asset 1: Inclusive Hands Icon -->
  <symbol id="inclusive-hands" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#0c4a6e" stroke-width="2"/>
    <g fill="#0c4a6e">
      <circle cx="30" cy="35" r="6"/>
      <circle cx="50" cy="28" r="6"/>
      <circle cx="70" cy="35" r="6"/>
      <circle cx="35" cy="60" r="6"/>
      <circle cx="65" cy="60" r="6"/>
    </g>
    <path d="M30 41 Q30 55 35 66" stroke="#0c4a6e" stroke-width="3" fill="none"/>
    <path d="M50 34 Q50 50 50 66" stroke="#0c4a6e" stroke-width="3" fill="none"/>
    <path d="M70 41 Q70 55 65 66" stroke="#0c4a6e" stroke-width="3" fill="none"/>
  </symbol>

  <!-- Asset 2: Digital Innovation Wave -->
  <symbol id="digital-wave" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#0c4a6e" stroke-width="2"/>
    <path d="M20 50 Q30 40 40 50 T60 50 T80 50" stroke="#0c4a6e" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="25" cy="50" r="3" fill="#0c4a6e"/>
    <circle cx="45" cy="50" r="3" fill="#0c4a6e"/>
    <circle cx="65" cy="50" r="3" fill="#0c4a6e"/>
    <circle cx="85" cy="50" r="3" fill="#0c4a6e"/>
    <rect x="30" y="65" width="40" height="3" rx="1.5" fill="#0c4a6e" opacity="0.6"/>
  </symbol>

  <!-- Asset 3: Accessibility Support -->
  <symbol id="accessibility" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#0c4a6e" stroke-width="2"/>
    <circle cx="50" cy="30" r="8" fill="#0c4a6e"/>
    <rect x="42" y="42" width="16" height="20" rx="2" fill="none" stroke="#0c4a6e" stroke-width="2"/>
    <path d="M42 62 L38 72 M58 62 L62 72" stroke="#0c4a6e" stroke-width="2" stroke-linecap="round"/>
    <path d="M42 50 L30 60 M58 50 L70 60" stroke="#0c4a6e" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Asset 4: Care Path Heart -->
  <symbol id="care-heart" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#0c4a6e" stroke-width="2"/>
    <path d="M50 65 C35 50 20 45 20 35 C20 25 28 20 35 20 C42 20 50 25 50 32 C50 25 58 20 65 20 C72 20 80 25 80 35 C80 45 65 50 50 65Z" fill="#0c4a6e" opacity="0.3" stroke="#0c4a6e" stroke-width="1.5"/>
    <path d="M45 50 L50 55 L55 50" stroke="#0c4a6e" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Asset 5: Growth Network -->
  <symbol id="growth-network" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#0c4a6e" stroke-width="2"/>
    <circle cx="30" cy="30" r="6" fill="#0c4a6e"/>
    <circle cx="70" cy="30" r="6" fill="#0c4a6e"/>
    <circle cx="50" cy="65" r="6" fill="#0c4a6e"/>
    <line x1="30" y1="30" x2="50" y2="65" stroke="#0c4a6e" stroke-width="2"/>
    <line x1="70" y1="30" x2="50" y2="65" stroke="#0c4a6e" stroke-width="2"/>
    <line x1="30" y1="30" x2="70" y2="30" stroke="#0c4a6e" stroke-width="2" stroke-dasharray="5,5"/>
  </symbol>

  <!-- Asset 6: Therapy Canvas -->
  <symbol id="therapy-canvas" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#0c4a6e" stroke-width="2"/>
    <rect x="25" y="25" width="50" height="50" rx="3" fill="none" stroke="#0c4a6e" stroke-width="2"/>
    <circle cx="40" cy="40" r="5" fill="#0c4a6e" opacity="0.6"/>
    <circle cx="60" cy="35" r="4" fill="#0c4a6e" opacity="0.5"/>
    <path d="M35 55 Q50 62 65 58" stroke="#0c4a6e" stroke-width="2" fill="none" stroke-linecap="round"/>
  </symbol>
</svg>

<!-- Hero Background Pattern -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" id="hero-pattern" style="display:none;">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#heroGrad)"/>
  <circle cx="150" cy="100" r="80" fill="#0c4a6e" opacity="0.08"/>
  <circle cx="1050" cy="500" r="120" fill="#38bdf8" opacity="0.06"/>
  <path d="M0 200 Q300 100 600 200 T1200 200" stroke="#0c4a6e" stroke-width="2" fill="none" opacity="0.1"/>
</svg>
