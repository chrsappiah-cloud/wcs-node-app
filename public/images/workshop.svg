<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  <rect width="1200" height="150" fill="url(#accentGradient)" opacity="0.1"/>

  <text x="600" y="80" font-size="56" font-weight="bold" fill="#e2e8f0" text-anchor="middle" font-family="Arial">
    Digital Storytelling for Dementia Care
  </text>
  <text x="600" y="135" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="Arial">
    World Class Scholars Workshop Session
  </text>

  <g>
    <rect x="100" y="200" width="1000" height="500" rx="20" fill="rgba(30, 27, 75, 0.6)" stroke="#7c3aed" stroke-width="2" opacity="0.8"/>

    <circle cx="250" cy="350" r="40" fill="#a98bfa"/>
    <rect x="220" y="390" width="60" height="80" rx="5" fill="#6366f1"/>
    <text x="250" y="520" font-size="14" fill="#cbd5e1" text-anchor="middle" font-family="Arial">Facilitator</text>

    <circle cx="600" cy="320" r="40" fill="#10b981"/>
    <rect x="560" y="360" width="80" height="20" rx="3" fill="#34d399"/>
    <text x="560" y="410" font-size="12" fill="#10b981" font-family="Arial">Laptop</text>
    <text x="600" y="520" font-size="14" fill="#cbd5e1" text-anchor="middle" font-family="Arial">Elder Participant</text>

    <circle cx="950" cy="350" r="40" fill="#06b6d4"/>
    <rect x="920" y="390" width="60" height="80" rx="5" fill="#0891b2"/>
    <text x="950" y="520" font-size="14" fill="#cbd5e1" text-anchor="middle" font-family="Arial">Co-Facilitator</text>

    <rect x="350" y="210" width="500" height="280" rx="10" fill="#1e1b4b" stroke="#06b6d4" stroke-width="3"/>
    <rect x="360" y="220" width="480" height="260" fill="#0f172a"/>

    <circle cx="600" cy="300" r="50" fill="#7c3aed" opacity="0.7"/>
    <text x="600" y="310" font-size="18" fill="#e2e8f0" text-anchor="middle" font-family="Arial">LIVE</text>
    <text x="600" y="410" font-size="14" fill="#a78bfa" text-anchor="middle" font-family="Arial">Remote Participants Connected</text>

    <line x1="250" y1="350" x2="600" y2="320" stroke="#7c3aed" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
    <line x1="600" y1="320" x2="950" y2="350" stroke="#10b981" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
    <line x1="600" y1="380" x2="600" y2="480" stroke="#06b6d4" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
  </g>

  <g>
    <text x="100" y="750" font-size="18" fill="#06b6d4" font-weight="bold" font-family="Arial">
      Hybrid Learning  |  Creative Arts  |  AI-Powered  |  Trauma-Responsive
    </text>
  </g>
</svg>
