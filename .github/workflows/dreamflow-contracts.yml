name: DreamFlow Contracts CI

on:
  pull_request:
    paths:
      - 'dreamflow/**'
      - '.github/workflows/dreamflow-contracts.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'dreamflow/**'
      - '.github/workflows/dreamflow-contracts.yml'
  workflow_dispatch:

jobs:
  contracts:
    name: Generate Contracts + Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: dreamflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dreamflow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run contract pipeline
        run: npm run ci:contracts

      - name: Build contract summary
        id: contract_summary
        run: |
          ENDPOINT_COUNT=$(node -e "const fs=require('node:fs');const p=JSON.parse(fs.readFileSync('docs/openapi.generated.json','utf8'));console.log(Object.keys(p.paths||{}).length);")
          SCHEMA_COUNT=$(node -e "const fs=require('node:fs');const p=JSON.parse(fs.readFileSync('docs/openapi.generated.json','utf8'));console.log(Object.keys((p.components&&p.components.schemas)||{}).length);")
          {
            echo "### DreamFlow Contract Pipeline"
            echo ""
            echo "- Status: success"
            echo "- OpenAPI path count: ${ENDPOINT_COUNT}"
            echo "- Component schema count: ${SCHEMA_COUNT}"
            echo "- Artifact: dreamflow-openapi-generated (docs/openapi.generated.json)"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "body<<EOF"
            echo "## DreamFlow Contracts CI"
            echo ""
            echo "- Status: success"
            echo "- OpenAPI path count: ${ENDPOINT_COUNT}"
            echo "- Component schema count: ${SCHEMA_COUNT}"
            echo "- Artifact: dreamflow-openapi-generated (docs/openapi.generated.json)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR with contract summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          CONTRACT_SUMMARY_BODY: ${{ steps.contract_summary.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = process.env.CONTRACT_SUMMARY_BODY || 'Contract summary not available.';
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const marker = '<!-- dreamflow-contracts-summary -->';
            const rendered = `${marker}\n${body}`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.data.find((c) =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: rendered,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: rendered,
              });
            }

      - name: Upload OpenAPI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dreamflow-openapi-generated
          path: dreamflow/docs/openapi.generated.json
          if-no-files-found: error
