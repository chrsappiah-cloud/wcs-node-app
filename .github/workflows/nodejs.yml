name: Node.js CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build backend (NestJS)
        run: pnpm --filter @dreamflow/api run build || true
      - name: Build frontend (static check)
        run: |
          cd WorldClassScholarsSite
          # Lint HTML, CSS, JS (optional, skip if not configured)
          if [ -f package.json ]; then pnpm install && pnpm run lint || true; fi
          echo "Static site ready: index.html, styles.css, script.js"
      - name: Run backend tests
        run: pnpm --filter @dreamflow/api run test || true
      - name: Run frontend tests (HTML validation)
        run: |
          cd WorldClassScholarsSite
          # Optionally run HTMLHint if configured
          if [ -f package.json ]; then pnpm run test || true; fi
          echo "No formal frontend tests defined"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python for static server
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Start static server (preview)
        run: |
          cd WorldClassScholarsSite
          python serve.py &
          sleep 3
          curl -I http://localhost:8000/index.html || true
      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static-site
          path: WorldClassScholarsSite/
