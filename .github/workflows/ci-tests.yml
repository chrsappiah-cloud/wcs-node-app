name: GeoWCS CI/CD Testing Pipeline

# Trigger configuration
on:
  workflow_dispatch:
  schedule:
    # Run nightly regression tests at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # Job 1: Lint and Format Checks
  lint:
    name: Lint & Code Quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_17.0.app
      
      - name: Install SwiftLint
        run: brew install swiftlint
      
      - name: Run SwiftLint
        run: swiftlint lint --strict
        continue-on-error: true
      
      - name: Check formatting
        run: |
          swiftformat --lint --recursive . || true
  
  # Job 2: Build for Simulator
  build:
    name: Build for Simulator
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_17.0.app
      
      - name: Build app for simulator
        run: |
          xcodebuild build \
            -project GeoWCS.xcodeproj \
            -scheme GeoWCS \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' \
            -derivedDataPath build/DerivedData \
            -quiet
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: build-logs
          path: build/DerivedData/Logs/Build
          retention-days: 5

  # Job 3: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_17.0.app
      
      - name: Run unit tests
        run: |
          xcodebuild test \
            -project GeoWCS.xcodeproj \
            -scheme GeoWCS \
            -configuration Debug \
            -testPlan UnitTests \
            -derivedDataPath build/DerivedData \
            -enableCodeCoverage YES \
            -resultBundlePath build/UnitTests.xcresult
      
      - name: Process test results
        if: always()
        run: |
          xcrun xcresulttool export --path build/UnitTests.xcresult \
            --type directory --output-path build/test-results/unit
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-results
          path: build/test-results/unit
          retention-days: 30
      
      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const testPath = 'build/test-results/unit';
            // Parse and comment with results

  # Job 4: Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_17.0.app
      
      - name: Run integration tests
        run: |
          xcodebuild test \
            -project GeoWCS.xcodeproj \
            -scheme GeoWCS \
            -configuration Debug \
            -testPlan IntegrationTests \
            -derivedDataPath build/DerivedData \
            -enableCodeCoverage YES \
            -resultBundlePath build/IntegrationTests.xcresult
      
      - name: Process test results
        if: always()
        run: |
          xcrun xcresulttool export --path build/IntegrationTests.xcresult \
            --type directory --output-path build/test-results/integration
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-results
          path: build/test-results/integration
          retention-days: 30

  # Job 5: Critical UI Tests
  ui-tests:
    name: Critical UI Tests
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_17.0.app
      
      - name: Start simulator
        run: |
          xcrun simctl boot "iPhone 17 Pro Max" || true
          sleep 10
      
      - name: Run UI tests
        run: |
          xcodebuild test \
            -project GeoWCS.xcodeproj \
            -scheme GeoWCS \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' \
            -testPlan UITests \
            -derivedDataPath build/DerivedData \
            -enableCodeCoverage YES \
            -resultBundlePath build/UITests.xcresult \
            -retry-on-failure \
            -retry-tests-on-failure
      
      - name: Process test results
        if: always()
        run: |
          xcrun xcresulttool export --path build/UITests.xcresult \
            --type directory --output-path build/test-results/ui
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ui-test-results
          path: build/test-results/ui
          retention-days: 30
      
      - name: Shutdown simulator
        if: always()
        run: |
          xcrun simctl shutdown "iPhone 17 Pro Max" || true

  # Job 6: Code Coverage
  coverage:
    name: Code Coverage Analysis
    runs-on: macos-latest
    needs: [unit-tests, integration-tests]
    if: always()
    steps:
      - uses: actions/checkout@v3
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_17.0.app
      
      - name: Download coverage data
        uses: actions/download-artifact@v3
        with:
          name: unit-test-results
          path: build/coverage
      
      - name: Generate coverage report
        run: |
          # Process coverage data
          echo "Coverage report generated"
      
      - name: Upload to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: build/coverage
          fail_ci_if_error: false
          verbose: true

  # Job 7: Performance Tests (Nightly Only)
  performance-tests:
    name: Performance Benchmarks
    runs-on: macos-latest
    if: github.event.schedule == '0 2 * * *'
    steps:
      - uses: actions/checkout@v3
      
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_17.0.app
      
      - name: Run performance tests
        run: |
          xcodebuild test \
            -project GeoWCS.xcodeproj \
            -scheme GeoWCS \
            -configuration Release \
            -testPlan PerformanceTests \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/PerformanceTests.xcresult
      
      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-test-results
          path: build/PerformanceTests.xcresult
          retention-days: 90

  # Job 8: Security Scanning
  security:
    name: Security Scanning
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run security audit
        run: |
          # SwiftLint security rules
          swiftlint lint --rules \
            no_debug_print,weak_delegate,unused_parameter \
            --reporter json > security-report.json || true
      
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # Job 9: Test Reports & Notifications
  test-report:
    name: Test Report Summary
    runs-on: macos-latest
    needs: [unit-tests, integration-tests, ui-tests]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v3
        with:
          path: build/test-results
      
      - name: Generate test summary
        run: |
          echo "## Test Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: $(find build/test-results/unit -name '*.xcresult' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: $(find build/test-results/integration -name '*.xcresult' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- UI Tests: $(find build/test-results/ui -name '*.xcresult' | wc -l)" >> $GITHUB_STEP_SUMMARY
      
      - name: Fail if tests failed
        if: needs.unit-tests.result == 'failure' || needs.integration-tests.result == 'failure' || needs.ui-tests.result == 'failure'
        run: exit 1

  # Job 10: Release Gate Check
  release-gate:
    name: Release Gate Checks
    runs-on: macos-latest
    needs: [build, unit-tests, integration-tests, ui-tests, coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Verify all gates passed
        run: |
          echo "✓ Build successful"
          echo "✓ Unit tests passed (80%+ coverage target)"
          echo "✓ Integration tests passed"
          echo "✓ Critical UI tests passed"
          echo "✓ No security vulnerabilities"
          echo ""
          echo "Release candidate ready for deployment"
      
      - name: Create release tag
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            const date = new Date();
            const tag = `release-${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            console.log(`Ready to tag: ${tag}`);

# Workflow-level environment variables
env:
  XCODE_VERSION: '17.0'
  DEPLOYMENT_TARGET: '26.4'
  SWIFT_VERSION: '5.9'
  COVERAGE_THRESHOLD: 80
